<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}西阵订单系统{% endblock title %}</title>

  {# HTMX + Alpine.js 前端增强：局部刷新 + 轻量交互。 #}
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    :root { --tenant-accent: {% block tenant_accent %}#07C160{% endblock tenant_accent %}; }
    body.admin-identity { --tenant-accent: #07C160; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f9fafb;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .app-header {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 16px;
    }
    .brand {
      color: var(--tenant-accent);
      font-weight: 700;
    }
  </style>
  {% block head_extra %}{% endblock head_extra %}
</head>
<body class="{% block body_class %}{% endblock body_class %}" data-tenant="{{ tenant_name | default(value='') }}">
  {% block body_shell %}
  <header class="app-header">
    <span class="brand">{{ tenant_name | default(value='西阵订单系统') }}</span>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  {% endblock body_shell %}
</body>
</html>
